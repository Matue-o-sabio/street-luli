
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Street Fighter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            border: 4px solid #333;
            border-radius: 8px;
        }

        /* Interface das Barras de Vida */
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .health-bar-container {
            width: 40%;
            height: 30px;
            background-color: #333;
            border: 3px solid white;
            border-radius: 5px;
            position: relative;
        }

        .health-bar {
            height: 100%;
            width: 100%;
            transition: width 0.2s ease-out;
        }

        #p1-health {
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            box-shadow: 0 0 10px #00f2fe;
            float: left;
        }

        #p2-health {
            background: linear-gradient(90deg, #f5576c 0%, #f093fb 100%);
            box-shadow: 0 0 10px #f5576c;
            float: right;
        }

        #timer {
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px white;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 10px;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #fff;
            display: none;
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 15px;
            z-index: 20;
        }

        .restart-btn {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .restart-btn:hover {
            background: #ddd;
        }

        /* Instruções na tela */
        #controls {
            display: flex;
            justify-content: space-between;
            width: 1024px;
            margin-top: 15px;
            background: #222;
            padding: 15px;
            border-radius: 8px;
            box-sizing: border-box;
            border: 1px solid #444;
        }

        .control-panel {
            text-align: center;
        }

        .p1-color { color: #00f2fe; text-shadow: 0 0 5px #00f2fe; }
        .p2-color { color: #f5576c; text-shadow: 0 0 5px #f5576c; }
        
        kbd {
            background-color: #444;
            border-radius: 3px;
            border: 1px solid #777;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 14px;
            margin: 0 2px;
            box-shadow: 1px 1px 0 #000;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div class="health-bar-container">
                <div id="p1-health" class="health-bar"></div>
            </div>
            <div id="timer">60</div>
            <div class="health-bar-container">
                <div id="p2-health" class="health-bar"></div>
            </div>
        </div>

        <div id="game-over">
            <span id="winner-text">Empate!</span><br>
            <button class="restart-btn" onclick="location.reload()">Jogar Novamente</button>
        </div>

        <canvas id="gameCanvas" width="1024" height="576"></canvas>
    </div>

    <div id="controls">
        <div class="control-panel">
            <h3 class="p1-color" style="margin:0 0 10px 0;">JOGADOR 1 (Ciano)</h3>
            <p style="margin:5px 0;">Mover: <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd></p>
            <p style="margin:5px 0;">Atacar: <kbd>Espaço</kbd></p>
        </div>
        <div class="control-panel">
            <h3 class="p2-color" style="margin:0 0 10px 0;">JOGADOR 2 (Rosa)</h3>
            <p style="margin:5px 0;">Mover: <kbd>↑</kbd> <kbd>←</kbd> <kbd>↓</kbd> <kbd>→</kbd></p>
            <p style="margin:5px 0;">Atacar: <kbd>Enter</kbd></p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const c = canvas.getContext('2d');

    const gravity = 0.7;

    // Fundo do jogo
    class Background {
        draw() {
            // Céu
            let gradient = c.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "#1a0b2e");
            gradient.addColorStop(1, "#3c1053");
            c.fillStyle = gradient;
            c.fillRect(0, 0, canvas.width, canvas.height);
            
            // Chão
            c.fillStyle = '#111';
            c.fillRect(0, canvas.height - 50, canvas.width, 50);
            
            // Linha neon do chão
            c.shadowBlur = 10;
            c.shadowColor = '#00ffcc';
            c.fillStyle = '#00ffcc';
            c.fillRect(0, canvas.height - 50, canvas.width, 3);
            c.shadowBlur = 0; // Reset
        }
    }

    class Fighter {
        constructor({ position, velocity, color, shadowColor, offset }) {
            this.position = position;
            this.velocity = velocity;
            this.width = 50;
            this.height = 150;
            this.lastKey;
            this.attackBox = {
                position: { x: this.position.x, y: this.position.y },
                offset: offset,
                width: 100,
                height: 50
            };
            this.color = color;
            this.shadowColor = shadowColor;
            this.isAttacking = false;
            this.health = 100;
            this.dead = false;
        }

        draw() {
            // Efeito visual do personagem (Glow)
            c.shadowBlur = 15;
            c.shadowColor = this.shadowColor;
            c.fillStyle = this.color;
            c.fillRect(this.position.x, this.position.y, this.width, this.height);
            c.shadowBlur = 0; // Reseta sombra

            // Detalhe (olhos/viseira)
            c.fillStyle = 'white';
            c.fillRect(this.attackBox.offset.x > 0 ? this.position.x + 30 : this.position.x + 5, this.position.y + 15, 15, 10);

            // Desenhar caixa de ataque se estiver atacando
            if (this.isAttacking) {
                c.fillStyle = 'white';
                c.shadowBlur = 20;
                c.shadowColor = 'white';
                c.fillRect(this.attackBox.position.x, this.attackBox.position.y, this.attackBox.width, this.attackBox.height);
                c.shadowBlur = 0;
            }
        }

        update() {
            this.draw();
            if (this.dead) return;

            // Atualiza posição da caixa de ataque
            this.attackBox.position.x = this.position.x + this.attackBox.offset.x;
            this.attackBox.position.y = this.position.y + 20; // Altura do soco

            this.position.x += this.velocity.x;
            this.position.y += this.velocity.y;

            // Limite da tela (X)
            if (this.position.x < 0) this.position.x = 0;
            if (this.position.x + this.width > canvas.width) this.position.x = canvas.width - this.width;

            // Física de Gravidade e limite do chão (Y)
            if (this.position.y + this.height + this.velocity.y >= canvas.height - 50) {
                this.velocity.y = 0;
                this.position.y = canvas.height - 50 - this.height;
            } else {
                this.velocity.y += gravity;
            }
        }

        attack() {
            this.isAttacking = true;
            setTimeout(() => {
                this.isAttacking = false;
            }, 100); // Tempo de duração do soco
        }
    }

    const background = new Background();

    const player = new Fighter({
        position: { x: 150, y: 0 },
        velocity: { x: 0, y: 0 },
        color: '#4facfe',
        shadowColor: '#00f2fe',
        offset: { x: 0, y: 0 } // Bate para a direita
    });

    const enemy = new Fighter({
        position: { x: 824, y: 0 },
        velocity: { x: 0, y: 0 },
        color: '#f5576c',
        shadowColor: '#f093fb',
        offset: { x: -50, y: 0 } // Bate para a esquerda
    });

    const keys = {
        a: { pressed: false },
        d: { pressed: false },
        w: { pressed: false },
        ArrowLeft: { pressed: false },
        ArrowRight: { pressed: false },
        ArrowUp: { pressed: false }
    };

    // Controle do Tempo e Fim de jogo
    let timer = 60;
    let timerId;
    function determineWinner() {
        clearTimeout(timerId);
        document.getElementById('game-over').style.display = 'block';
        if (player.health === enemy.health) {
            document.getElementById('winner-text').innerText = 'EMPATE!';
        } else if (player.health > enemy.health) {
            document.getElementById('winner-text').innerText = 'JOGADOR 1 VENCEU!';
        } else {
            document.getElementById('winner-text').innerText = 'JOGADOR 2 VENCEU!';
        }
    }

    function decreaseTimer() {
        if (timer > 0) {
            timerId = setTimeout(decreaseTimer, 1000);
            timer--;
            document.getElementById('timer').innerText = timer;
        }
        if (timer === 0) determineWinner();
    }
    decreaseTimer();

    // Detecção de Colisão
    function rectangularCollision({ rect1, rect2 }) {
        return (
            rect1.attackBox.position.x + rect1.attackBox.width >= rect2.position.x &&
            rect1.attackBox.position.x <= rect2.position.x + rect2.width &&
            rect1.attackBox.position.y + rect1.attackBox.height >= rect2.position.y &&
            rect1.attackBox.position.y <= rect2.position.y + rect2.height
        );
    }

    // Loop de Animação
    function animate() {
        window.requestAnimationFrame(animate);
        c.fillStyle = 'black';
        c.fillRect(0, 0, canvas.width, canvas.height);
        
        background.draw();
        
        player.update();
        enemy.update();

        // Movimentação Jogador 1 (W, A, D)
        player.velocity.x = 0;
        if (keys.a.pressed && player.lastKey === 'a') {
            player.velocity.x = -5;
            player.attackBox.offset.x = -50; // Vira pra esquerda
        } else if (keys.d.pressed && player.lastKey === 'd') {
            player.velocity.x = 5;
            player.attackBox.offset.x = 0; // Vira pra direita
        }

        // Movimentação Jogador 2 (Setas)
        enemy.velocity.x = 0;
        if (keys.ArrowLeft.pressed && enemy.lastKey === 'ArrowLeft') {
            enemy.velocity.x = -5;
            enemy.attackBox.offset.x = -50; // Vira pra esquerda
        } else if (keys.ArrowRight.pressed && enemy.lastKey === 'ArrowRight') {
            enemy.velocity.x = 5;
            enemy.attackBox.offset.x = 0; // Vira pra direita
        }

        // Detectar Colisões - Player atacando Enemy
        if (rectangularCollision({ rect1: player, rect2: enemy }) && player.isAttacking) {
            player.isAttacking = false;
            enemy.health -= 10;
            document.getElementById('p2-health').style.width = Math.max(0, enemy.health) + '%';
        }

        // Detectar Colisões - Enemy atacando Player
        if (rectangularCollision({ rect1: enemy, rect2: player }) && enemy.isAttacking) {
            enemy.isAttacking = false;
            player.health -= 10;
            document.getElementById('p1-health').style.width = Math.max(0, player.health) + '%';
        }

        // Fim de jogo por vida zerada
        if (enemy.health <= 0 || player.health <= 0) {
            if (enemy.health <= 0) enemy.dead = true;
            if (player.health <= 0) player.dead = true;
            determineWinner();
        }
    }

    animate();

    // Eventos de Teclado
    window.addEventListener('keydown', (event) => {
        if (!player.dead && !enemy.dead) {
            switch (event.key) {
                // Jogador 1
                case 'd':
                    keys.d.pressed = true;
                    player.lastKey = 'd';
                    break;
                case 'a':
                    keys.a.pressed = true;
                    player.lastKey = 'a';
                    break;
                case 'w':
                    if (player.velocity.y === 0) player.velocity.y = -15; // Pulo
                    break;
                case ' ':
                    player.attack();
                    break;

                // Jogador 2
                case 'ArrowRight':
                    keys.ArrowRight.pressed = true;
                    enemy.lastKey = 'ArrowRight';
                    break;
                case 'ArrowLeft':
                    keys.ArrowLeft.pressed = true;
                    enemy.lastKey = 'ArrowLeft';
                    break;
                case 'ArrowUp':
                    if (enemy.velocity.y === 0) enemy.velocity.y = -15;
                    break;
                case 'Enter':
                    enemy.attack();
                    break;
            }
        }
    });

    window.addEventListener('keyup', (event) => {
        switch (event.key) {
            // Jogador 1
            case 'd': keys.d.pressed = false; break;
            case 'a': keys.a.pressed = false; break;
            // Jogador 2
            case 'ArrowRight': keys.ArrowRight.pressed = false; break;
            case 'ArrowLeft':  keys.ArrowLeft.pressed = false; break;
        }
    });
</script>
</body>
</html>
