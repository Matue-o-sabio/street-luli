<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoJo's Bizarre Adventure · Enciclopédia de Partes</title>
    
    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(22, 24, 34, 0.75);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f3f8;
            --text-muted: #a0a8b8;
            --accent: #ffd700;
            --accent-glow: rgba(255, 215, 0, 0.35);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            overflow-x: hidden;
            transition: background 0.6s ease;
        }

        /* Background Dinâmico com Gradiente Radial Sutil */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            transition: background 0.6s ease;
        }

        /* ===== MENU DE ABAS ===== */
        .header-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11, 12, 16, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--card-border);
            padding: 0.8rem 1rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .tab-menu {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .tab-btn:hover {
            color: #fff;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: var(--accent);
            color: #0b0c10;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            font-weight: 700;
        }

        /* ===== CONTEÚDO PRINCIPAL ===== */
        .container {
            flex: 1;
            max-width: 1300px;
            margin: 2rem auto;
            padding: 2.5rem;
            width: 92%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .part-content {
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== CABEÇALHO DA PARTE ===== */
        .part-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .part-number-badge {
            display: inline-block;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.2rem;
        }

        .part-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.8rem;
            letter-spacing: 3px;
            line-height: 1;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            margin-bottom: 0.5rem;
        }

        .part-sub {
            font-size: 1.15rem;
            color: var(--text-muted);
            max-width: 700px;
            margin: 0 auto 1.5rem auto;
            font-weight: 300;
        }

        /* TAGS DE METADADOS */
        .meta-tags {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .tag span {
            color: var(--accent);
            font-weight: 600;
        }

        /* ===== LAYOUT GRID (3 COLUNAS) ===== */
        .layout-grid {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 2.5rem;
            align-items: start;
        }

        /* CARDS DE PERSONAGENS */
        .char-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 18px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            position: relative;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .char-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px var(--accent-glow);
            border-color: var(--accent);
        }

        .img-wrapper {
            position: relative;
            width: 100%;
            height: 380px;
            overflow: hidden;
        }

        .char-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            transition: transform 0.5s ease;
        }

        .char-card:hover .char-img {
            transform: scale(1.06);
        }

        .char-role-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: var(--accent);
        }

        .char-info {
            padding: 1.2rem;
            text-align: center;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .char-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 1px;
            color: #fff;
            line-height: 1.1;
        }

        /* TEXTO DA HISTÓRIA */
        .story-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 1.8rem;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            font-size: 1.05rem;
            color: #e0e6ed;
        }

        .story-box p {
            line-height: 1.7;
        }

        .highlight-box {
            border-left: 3px solid var(--accent);
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            border-radius: 0 10px 10px 0;
            font-style: italic;
            color: var(--text-muted);
            font-size: 0.98rem;
        }

        /* ===== TEMAS POR PARTE (Cores Neons Modernas) ===== */
        body.theme-p1 { --accent: #ff4757; --accent-glow: rgba(255, 71, 87, 0.3); }
        body.theme-p2 { --accent: #2ed573; --accent-glow: rgba(46, 213, 115, 0.3); }
        body.theme-p3 { --accent: #ffa502; --accent-glow: rgba(255, 165, 2, 0.3); }
        body.theme-p4 { --accent: #ff78ae; --accent-glow: rgba(255, 120, 174, 0.3); }
        body.theme-p5 { --accent: #eccc68; --accent-glow: rgba(236, 204, 104, 0.3); }
        body.theme-p6 { --accent: #1e90ff; --accent-glow: rgba(30, 144, 255, 0.3); }
        body.theme-p7 { --accent: #d2dae2; --accent-glow: rgba(210, 218, 226, 0.3); }
        body.theme-p8 { --accent: #70a1ff; --accent-glow: rgba(112, 161, 255, 0.3); }
        body.theme-p9 { --accent: #00d2d3; --accent-glow: rgba(0, 210, 211, 0.3); }

        /* Backgrounds combinados */
        body.theme-p1 .bg-overlay { background: radial-gradient(circle at 50% 20%, #3a1515 0%, #0b0c10 70%); }
        body.theme-p2 .bg-overlay { background: radial-gradient(circle at 50% 20%, #173322 0%, #0b0c10 70%); }
        body.theme-p3 .bg-overlay { background: radial-gradient(circle at 50% 20%, #3a2810 0%, #0b0c10 70%); }
        body.theme-p4 .bg-overlay { background: radial-gradient(circle at 50% 20%, #3a1028 0%, #0b0c10 70%); }
        body.theme-p5 .bg-overlay { background: radial-gradient(circle at 50% 20%, #3a3310 0%, #0b0c10 70%); }
        body.theme-p6 .bg-overlay { background: radial-gradient(circle at 50% 20%, #10233a 0%, #0b0c10 70%); }
        body.theme-p7 .bg-overlay { background: radial-gradient(circle at 50% 20%, #2b2b2b 0%, #0b0c10 70%); }
        body.theme-p8 .bg-overlay { background: radial-gradient(circle at 50% 20%, #102b3a 0%, #0b0c10 70%); }
        body.theme-p9 .bg-overlay { background: radial-gradient(circle at 50% 20%, #0a3a3a 0%, #0b0c10 70%); }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 1024px) {
            .layout-grid {
                grid-template-columns: 240px 1fr 240px;
                gap: 1.5rem;
            }
            .img-wrapper { height: 320px; }
            .part-title { font-size: 3rem; }
        }

        @media (max-width: 850px) {
            .layout-grid {
                grid-template-columns: 1fr 1fr;
                grid-template-areas: 
                    "hero villain"
                    "story story";
            }
            .hero-card { grid-area: hero; }
            .villain-card { grid-area: villain; }
            .story-box { grid-area: story; }
            .container { padding: 1.5rem; }
            .part-title { font-size: 2.5rem; }
        }

        @media (max-width: 520px) {
            .layout-grid {
                grid-template-columns: 1fr;
                grid-template-areas: 
                    "hero"
                    "story"
                    "villain";
            }
            .img-wrapper { height: 360px; }
            .tab-btn { font-size: 0.95rem; padding: 0.4rem 0.8rem; }
        }
    </style>
</head>

            const tabButtons = document.querySelectorAll('.tab-btn');
            const displayDiv = document.getElementById('partDisplay');
            const body = document.body;

            // Função para carregar e renderizar os dados da parte
            function loadPart(partNumber) {
                const data = partesData[partNumber];
                if (!data) return;

                // Animação de entrada
                displayDiv.classList.remove('part-content');
                void displayDiv.offsetWidth; // Forçar reflow
                displayDiv.classList.add('part-content');

                // Renderização do HTML Interno
                displayDiv.innerHTML = `
                    <div class="part-header">
                        <span class="part-number-badge">Parte 0${partNumber}</span>
                        <h1 class="part-title">${data.titulo}</h1>
                        <p class="part-sub">${data.subtitulo}</p>
                        
                        <div class="meta-tags">
                            <div class="tag">Ano: <span>${data.ano}</span></div>
                            <div class="tag">Local: <span>${data.local}</span></div>
                            <div class="tag">Poder: <span>${data.sistema}</span></div>
                        </div>
                    </div>
                    
                    <div class="layout-grid">
                        <!-- HERO CARD -->
                        <div class="char-card hero-card">
                            <div class="img-wrapper">
                                <span class="char-role-badge">Protagonista</span>
                                <img src="${data.imgHeroi}" alt="${data.nomeHeroi}" class="char-img" onerror="this.src='https://via.placeholder.com/400x600/1a1d28/ffffff?text=${encodeURIComponent(data.nomeHeroi)}'">
                            </div>
                            <div class="char-info">
                                <h3 class="char-name">${data.nomeHeroi}</h3>
                            </div>
                        </div>
                        
                        <!-- STORY TEXT -->
                        <div class="story-box">
                            ${data.texto}
                        </div>
                        
                        <!-- VILLAIN CARD -->
                        <div class="char-card villain-card">
                            <div class="img-wrapper">
                                <span class="char-role-badge">Antagonista</span>
                                <img src="${data.imgVilao}" alt="${data.nomeVilao}" class="char-img" onerror="this.src='https://via.placeholder.com/400x600/1a1d28/ffffff?text=${encodeURIComponent(data.nomeVilao)}'">
                            </div>
                            <div class="char-info">
                                <h3 class="char-name">${data.nomeVilao}</h3>
                            </div>
                        </div>
                    </div>
                `;

                // Atualizar estado visual do menu
                tabButtons.forEach(btn => btn.classList.remove('active'));
                const activeBtn = document.querySelector(`.tab-btn[data-part="${partNumber}"]`);
                if (activeBtn) activeBtn.classList.add('active');

                // Atualizar tema dinamico da pagina
                body.className = body.className.split(' ').filter(c => !c.startsWith('theme-p')).join(' ');
                body.classList.add(`theme-p${partNumber}`);
            }

            // Event Listener nos botões do menu
            tabButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    loadPart(parseInt(this.dataset.part, 10));
                });
            });

            // Atalhos numéricos no teclado (1-9)
            document.addEventListener('keydown', (e) => {
                const num = parseInt(e.key, 10);
                if (num >= 1 && num <= 9) {
                    loadPart(num);
                }
            });

            // Carregamento inicial (Parte 1)
            loadPart(1);
        })();
    </script>
</body>
</html>
